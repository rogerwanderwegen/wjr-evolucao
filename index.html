<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WJR - Evolucao Semanal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f4f0fb; min-height: 100vh; color: #111827; }
.header { background: #5B2D8E; padding: 20px 24px; display: flex; align-items: center; gap: 14px; }
.header-logo { width: 44px; height: 44px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #5B2D8E; font-size: 13px; }
.header h1 { color: white; font-size: 17px; font-weight: 600; }
.header p { color: #c4a8e8; font-size: 12px; margin-top: 1px; }
.container { padding: 24px 20px; max-width: 540px; margin: 0 auto; }
.section-label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
.fisio-card { background: white; border: 1.5px solid #e5e7eb; border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.15s; }
.fisio-card:hover { border-color: #5B2D8E; box-shadow: 0 0 0 3px rgba(91,45,142,0.08); }
.fisio-card .nome { font-weight: 600; font-size: 15px; }
.fisio-card .esp { font-size: 12px; color: #6b7280; margin-top: 2px; }
.fisio-card .arrow { color: #5B2D8E; font-size: 20px; }
.btn { background: transparent; border: 1.5px solid #5B2D8E; color: #5B2D8E; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; transition: all 0.15s; }
.btn:hover { background: #f0eaf8; }
.btn-primary { background: #5B2D8E; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 32px; }
.back-btn { display: flex; align-items: center; gap: 6px; color: #5B2D8E; font-size: 13px; font-weight: 500; cursor: pointer; padding: 4px 0; margin-bottom: 16px; background: none; border: none; }
.badge { background: #5B2D8E; color: white; border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; }
.badge .label { font-size: 11px; opacity: 0.75; margin-bottom: 2px; }
.badge .nome { font-size: 17px; font-weight: 700; }
.campo { margin-bottom: 14px; }
.campo label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
input[type=text], textarea { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 13px; color: #111827; transition: border-color 0.12s; }
input[type=text]:focus, textarea:focus { outline: none; border-color: #5B2D8E; }
textarea { resize: none; line-height: 1.5; }
.status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.status-opt { border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 8px 4px; text-align: center; cursor: pointer; font-size: 11px; font-weight: 500; background: white; transition: all 0.12s; }
.status-opt.verde { border-color: #16a34a; background: #dcfce7; color: #16a34a; }
.status-opt.amarelo { border-color: #ca8a04; background: #fef9c3; color: #ca8a04; }
.status-opt.vermelho { border-color: #dc2626; background: #fee2e2; color: #dc2626; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; }
.toggle-label { font-size: 13px; font-weight: 500; }
.toggle { width: 42px; height: 24px; background: #e5e7eb; border-radius: 12px; cursor: pointer; position: relative; border: none; transition: background 0.2s; }
.toggle.on { background: #5B2D8E; }
.toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s; }
.toggle.on::after { left: 21px; }
.paciente-block { background: white; border: 1.5px solid #e5e7eb; border-radius: 14px; margin-bottom: 14px; overflow: hidden; }
.paciente-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
.paciente-nome { font-weight: 600; font-size: 14px; }
.paciente-body { padding: 14px 16px; }
.sessao-badge { font-size: 11px; font-weight: 600; background: #f0eaf8; color: #5B2D8E; padding: 3px 9px; border-radius: 20px; }
.add-btn { width: 100%; border: 1.5px dashed #c4a8e8; background: #f0eaf8; color: #5B2D8E; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
.tab-bar { display: flex; gap: 8px; margin-bottom: 20px; }
.tab { flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid #e5e7eb; background: white; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; color: #6b7280; }
.tab.ativo { background: #5B2D8E; color: white; border-color: #5B2D8E; }
.relatorio-card { background: white; border: 1.5px solid #e5e7eb; border-radius: 14px; margin-bottom: 16px; overflow: hidden; }
.relatorio-header { padding: 14px 18px; background: #5B2D8E; color: white; display: flex; justify-content: space-between; align-items: center; }
.relatorio-header .fisio-r { font-weight: 700; font-size: 15px; }
.paciente-row { padding: 12px 18px; border-bottom: 1px solid #e5e7eb; }
.paciente-row:last-child { border-bottom: none; }
.pr-nome { font-weight: 600; font-size: 13px; }
.pr-info { font-size: 12px; color: #6b7280; margin-top: 2px; }
.pr-obs { font-size: 12px; color: #555; margin-top: 4px; }
.flag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-right: 4px; }
.flag-alta { background: #fee2e2; color: #dc2626; }
.flag-renovar { background: #fef9c3; color: #ca8a04; }
.empty-state { text-align: center; padding: 40px 20px; color: #6b7280; font-size: 14px; }
.wpp-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: #25D366; color: white; border: none; border-radius: 12px; padding: 14px 20px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 10px; text-decoration: none; }
.check-circle { width: 80px; height: 80px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #16a34a; margin-bottom: 20px; }
#tela-selecao, #tela-formulario, #tela-confirmacao, #tela-diretor { display: none; min-height: 100vh; flex-direction: column; }
#tela-selecao { display: flex; }
#tela-confirmacao { align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
</style>
</head>
<body>

<div id="tela-selecao">
  <div class="header"><div class="header-logo">WJR</div><div><h1>Evolucao Semanal</h1><p>WJR Fisioterapia Esportiva</p></div></div>
  <div class="container">
    <div class="section-label" style="margin-bottom:6px">Semana: <span id="semana-label"></span></div>
    <div class="section-label" style="margin-top:16px">Selecione seu nome</div>
    <div id="lista-fisios"></div>
    <div style="margin-top:20px;border-top:1px solid #e5e7eb;padding-top:16px">
      <div class="section-label">Acesso diretor</div>
      <button class="btn" onclick="abrirDiretor()">Ver relatorio consolidado</button>
    </div>
  </div>
</div>

<div id="tela-formulario">
  <div class="header"><div class="header-logo">WJR</div><div><h1>Evolucao Semanal</h1><p>WJR Fisioterapia Esportiva</p></div></div>
  <div class="container">
    <button class="back-btn" onclick="voltarSelecao()">&#8592; Voltar</button>
    <div class="badge"><div class="label">Preenchendo como</div><div class="nome" id="nome-fisio-badge"></div></div>
    <div id="lista-pacientes"></div>
    <button class="add-btn" onclick="adicionarPaciente()">+ Adicionar paciente</button>
    <button class="btn-primary" onclick="enviarFormulario()">Enviar evolucao semanal</button>
  </div>
</div>

<div id="tela-confirmacao">
  <div class="check-circle">ENVIADO</div>
  <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">Enviado com sucesso!</h2>
  <p style="color:#6b7280;font-size:14px;max-width:320px">A evolucao foi registrada para esta semana.</p>
  <br>
  <button class="btn" style="max-width:280px" onclick="voltarSelecao()">Voltar ao inicio</button>
</div>

<div id="tela-diretor">
  <div class="header"><div class="header-logo">WJR</div><div><h1>Painel do Diretor</h1><p>Evolucao consolidada</p></div></div>
  <div class="container">
    <button class="back-btn" onclick="voltarSelecao()">&#8592; Voltar</button>
    <div class="tab-bar">
      <button class="tab ativo" onclick="filtrarRelatorio('todos',this)">Todos</button>
      <button class="tab" onclick="filtrarRelatorio('alta',this)">Alta prevista</button>
      <button class="tab" onclick="filtrarRelatorio('renovar',this)">Renovar pacote</button>
    </div>
    <div id="relatorio-conteudo"></div>
    <div id="wpp-section"></div>
  </div>
</div>

<script>
const APPS_URL='https://script.google.com/macros/s/AKfycbwwnG0JEGW4JqeNiyJrP4gtse3j28NbTJ1Ebrx10Vn8gbcCTP-HUjvlTPocPdnz9TBUyg/exec';
const FISIOS=[{id:'f1',nome:'Adriano Bastos',esp:'Fisioterapia Esportiva'},{id:'f2',nome:'Andre Deretti',esp:'Fisioterapia Esportiva'},{id:'f3',nome:'Felipe Zanghelini',esp:'Fisioterapia Esportiva'},{id:'f4',nome:'Murilo Demathe',esp:'Fisioterapia Esportiva'},{id:'f5',nome:'Heryks Zanotti',esp:'Fisioterapia Esportiva'},{id:'f6',nome:'Antonio Carlos Denarde',esp:'Fisioterapia Esportiva'}];
let fisioAtual=null,pacientes=[],relFiltro='todos',pId=0;
function getSemana(){const h=new Date(),s=new Date(h);s.setDate(h.getDate()-((h.getDay()+6)%7));const x=new Date(s);x.setDate(s.getDate()+4);const f=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});return 'Semana '+f(s)+' - '+f(x);}
function getChave(){const h=new Date(),s=new Date(h);s.setDate(h.getDate()-((h.getDay()+6)%7));return s.toISOString().slice(0,10);}
function iniciar(){try{document.getElementById('semana-label').textContent=getSemana();}catch(e){}const l=document.getElementById('lista-fisios');if(!l)return;lInnerHTML=${l.innerHTML}='';FISIOS.forEach(f=>{const ok=!!sessionStorage.getItem('wjr_'+f.id+'_'+getChave());l.innerHTML+=`<div class="fisio-card" onclick="selecionarFisio('${f.id}')"><div><div class="nome">${f.nome}${ok?' (OK)':''}</div><div class="esp">${f.esp}</div></div><span class="arrow">></span></div>`;});}
function selecionarFisio(id){fisioAtual=FISIOS.find(f=>f.id===id);pacientes=[novoPaciente()];document.getElementById('nome-fisio-badge').textContent=fisioAtual.nome;mostrar('tela-formulario');renderPacientes();}
function novoPaciente(){return{id:pId++,nome:'',lesao:'',sessaoAtual:'',status:'',obs:'',alta:false,renovar:false};}
function adicionarPaciente(){pacientes.push(novoPaciente());renderPacientes();}
function renderPacientes(){const l=document.getElementById('lista-pacientes');l.innerHTML='';pacientes.forEach((p,i)=>{l.innerHTML+=`<div class="paciente-block" id="pb-${p.id}"><div class="paciente-header"><div class="paciente-nome">${p.nome||'Paciente '+(i+1)}</div><div style="display:flex;gap:8px;align-items:center">${p.sessaoAtual?`<span class="sessao-badge">Sessao ${p.sessaoAtual}</span>`:''}${pacientes.length>1?`<span style="cursor:pointer;color:#dc2626;font-size:18px" onclick="removerPaciente(${p.id})">x</span>`:''}</div></div><div class="paciente-body"><div class="campo"><label>Nome</label><input type="text" placeholder="Ey: Joao Silva" value="${p.nome}" oninput="atualizar(${p.id},'nome',this.value)"></div><div class="campo"><label>Lesao</label><input type="text" placeholder="Ex: Lombalgia..." value="${p.lesao}" oninput="atualizar(${p.id},'lesao',this.value)"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="campo"><label>Sessao atual</label><input type="text" placeholder="J: 6" value="${p.sessaoAtual}" oninput="atualizar(${p.id},'sessaoAtual',this.value)"></div><div class="campo"><label>Total sessoes</label><input type="text" placeholder="Ex: 12" value="${p.totalSessoes}" oninput="atualizar(${p.id},'totalSessoes',this.value)"></div></div><div class="campo"><label>Evolucao</label><div class="status-grid"><div class="status-opt ${p.status==='evoluindo''verde':''}" onclick="atualizar(${p.id},'status','evoluindo');renderPacientes()">Evoluindo rapido</div><div class="status-opt ${p.status==='estavel'?'amarelo8':''}" onclick="atualizar(${p.id},'status','estavel');renderPacientes()">Evoluindo normal</div><div class="status-opt ${p.status==='atencao'?'vermelho':''}" onclick="atualizar(${p.id},'status','atencao');renderPacientes()">Atencao urgente</div></div></div><div class="campo"><label>Observacoes</label><textarea rows="2" oninput="atualizar(${p.id},'obs',this.value)">${p.obs}</textarea></div><div class="campo"><div class="toggle-row"><span class="toggle-label">Alta prevista essa semana?</span><button class="toggle ${p.alta?'on':''}" onclick="toggleCampo(${p.id},'alta')"></button></div></div><div class="campo"><div class="toggle-row"><span class="toggle-label">Renovar pacote em breve?</span><button class="toggle ${p.renovar?'on':''}" onclick="toggleCampo(${p.id},'renovar')"></button></div></div></div></div>`;});}
function atualizar(id,campo,valor){const p=pacientes.find(p=>p.id===id);if(p)p[campo]=valor;const h=document.querySelector('#pb-'+id+' .paciente-nome');if(h)h.textContent=p.nome||'Paciente '+(pacientes.indexOf(p)+1);}
function toggleCampo(id,campo){const p=pacientes.find(p=>p.id===id);if(p)p[campo]=!p[campo];renderPacientes();}
function removerPaciente(id){pacientes=pacientes.filter(p=>p.id!==id);renderPacientes();}
async function enviarFormulario(){const pr=pacientes.filter(p=>p.nome.trim());if(!pr.length){alert('Adicione pelo menos um paciente.');return;}const btn=document.querySelector('.btn-primary');btn.textContent='Enviando...';btn.disabled=true;sessionStorage.setItem('wjr_'+fisioAtual.id+'_'+getChave(),JSON.stringify({fisio:fisioAtual,pacientes:pr}));try{await fetch(APPS_URL,{method:'POST',body:JSON.stringify({semana:getChave(),fisio_id:fisioAtual.id,fisio_nome:fisioAtual.nome,pacientes:pr,enviado_em:new Date().toISOString()})});}catch(e){}mostrar('tela-confirmacao');}
function abrirDiretor(){mostrar('tela-diretor');renderRelatorio();}
function filtrarRelatorio(f,btn){relFiltro=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ativo'));btn.classList.add('ativo');renderRelatorio();}
async function renderRelatorio(){const c=document.getElementById('relatorio-conteudo');c.innerHTML='<div class="empty-state">Carregando...</div>';let rels=[];try{const r=await fetch(APPS_URL+'?semana='+getChave());const rows=await r.json();const m={};rows.forEach(row=>{if(!m[row.fisio_id])m[row.fisio_id]={fisio:FISIOS.find(f=>f.id===row.fisio_id)||{nome:row.fisio_nome},pacientes:[]};m[row.fisio_id].pacientes.push({nome:row.paciente_nome,lesao:row.lesao,sessaoAtual:row.sessao_atual,totalSessoes:row.total_sessoes,status:row.status,obs:row.observacao,alta:row.alta_prevista==='Sim',renovar:row.renovar_pacote==='Sim'});});rels=Object.values(m);}catch(e){rels=FISIOS.map(f=>{const raw=sessionStorage.getItem('wjr_'+f.id+'_'+getChave());if(!raw)return null;const d=JSON.parse(raw);return{fisio:f,pacientes:d.pacientes||[]};}).filter(Boolean);}if(!rels.length){c.innerHTML='<div class="empty-state">Nenhum fisio preencheu ainda.</div>';return;}let html='';const sl={evoluindo:'Evoluindo rapido',estavel:'Evoluindo normal',atencao:'Merece atencao urgente'};rels.forEach(r=>{let pacs=r.pacientes;if(relFiltro==='alta'iPacs=pacs.filter(p=>p.alta);if(relFiltro==='renovar')pacs=pacs.filter(p=>p.renovar);if(!pacs.length)return;html+=`<div class="relatorio-card"><div class="relatorio-header"><span class="fisio-r">${r.fisio.nome}</span><span>${pacs.length} paciente(s)</span></div>`;pacs.forEach(p=>{html+=`<div class="paciente-row"><div class="pr-nome">${p.nome}</div><div class="pr-info">${sl[p.status]||'-'} - Sessao ${p.sessaoAtual||'?'}${p.lesao?' - '+p.lesao:'}</div>${p.obs?`<div class="pr-obs">${p.obs}</div>`:''}<div style="margin-top:4px">${p.alta?'<span class="flag flag-alta">Alta prevista</span>':''}${p.renovar?'<span class="flag flag-renovar">Renovar</span>':''}</div></div>`;});html+='</div>';});c.innerHTML=html||'<div class="empty-state">Nenhum registro.</div>';const wpp=document.getElementById('wpp-section');const nao=FISIOS.filter(f=>!sessionStorage.getItem('wjr_'+f.id+'_'+getChave()));if(nao.length){const link=encodeURIComponent('Oi! Preencha a evolucao dos seus pacientes desta semana: '+window.location.href);wpp.innerHTML='<div style="margin-top:8px"><div class="section-label">Nao preencheram ainda</div>'+nao.map(f=>`<a class="wpp-btn" href="https://wa.me/?text=${link}" target="_blank">Cobrar ${f.nome}</a>`).join('')+'</div>';}else wpp.innerHTML='';}
function mostrar(id){['tela-selecao','tela-formulario','tela-confirmacao','tela-diretor'].forEach(t=>document.getElementById(t).style.display='none');document.getElementById(id).style.display='flex';window.scrollTo(0,0);}
function voltarSelecao(){mostrar('tela-selecao');iniciar();}
iniciar();
</script>
</body>
</html>
